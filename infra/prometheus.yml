global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # 采集 aiops-agent 自身的 actuator 指标
  - job_name: 'aiops-agent'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          service: 'aiops-agent'
