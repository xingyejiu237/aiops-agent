<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIOps Agent - 智能运维助手</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
        }

        /* ===== 左侧：对话区 ===== */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #1e293b;
        }

        .chat-header {
            padding: 16px 24px;
            background: #1e293b;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #38bdf8;
        }

        .chat-header .session-info {
            font-size: 12px;
            color: #94a3b8;
        }

        .chat-header .session-info input {
            background: #0f172a;
            border: 1px solid #475569;
            color: #e2e8f0;
            padding: 4px 8px;
            border-radius: 4px;
            width: 200px;
            font-size: 12px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
        }

        .message {
            margin-bottom: 16px;
            max-width: 85%;
        }

        .message.user {
            margin-left: auto;
        }

        .message-label {
            font-size: 11px;
            color: #64748b;
            margin-bottom: 4px;
        }

        .message.user .message-label { text-align: right; }

        .message-content {
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 14px;
        }

        .message.user .message-content {
            background: #1d4ed8;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: #1e293b;
            border: 1px solid #334155;
            border-bottom-left-radius: 4px;
        }

        .message.assistant .message-content p { margin-bottom: 8px; }
        .message.assistant .message-content p:last-child { margin-bottom: 0; }
        .message.assistant .message-content code {
            background: #0f172a;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
            color: #38bdf8;
        }
        .message.assistant .message-content pre {
            background: #0f172a;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
        }
        .message.assistant .message-content pre code {
            background: none;
            padding: 0;
        }
        .message.assistant .message-content table {
            border-collapse: collapse;
            margin: 8px 0;
            width: 100%;
        }
        .message.assistant .message-content th,
        .message.assistant .message-content td {
            border: 1px solid #334155;
            padding: 6px 10px;
            font-size: 13px;
        }
        .message.assistant .message-content th {
            background: #0f172a;
        }

        .message.tool-call .message-content {
            background: #1c1917;
            border: 1px solid #44403c;
            font-size: 12px;
            color: #a8a29e;
        }

        .chat-input-area {
            padding: 16px 24px;
            background: #1e293b;
            border-top: 1px solid #334155;
        }

        .chat-input-row {
            display: flex;
            gap: 8px;
        }

        .chat-input-row textarea {
            flex: 1;
            background: #0f172a;
            border: 1px solid #475569;
            color: #e2e8f0;
            padding: 10px 14px;
            border-radius: 8px;
            resize: none;
            font-size: 14px;
            font-family: inherit;
            min-height: 44px;
            max-height: 120px;
        }

        .chat-input-row textarea:focus {
            outline: none;
            border-color: #38bdf8;
        }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
        }

        .btn-primary:hover { background: #1d4ed8; }
        .btn-primary:disabled { background: #475569; cursor: not-allowed; }

        .btn-danger {
            background: #991b1b;
            color: white;
        }

        .btn-danger:hover { background: #7f1d1d; }

        .btn-secondary {
            background: #334155;
            color: #e2e8f0;
        }

        .btn-secondary:hover { background: #475569; }

        .btn-sm {
            padding: 4px 10px;
            font-size: 12px;
        }

        /* ===== 右侧：知识库管理 ===== */
        .doc-panel {
            width: 380px;
            display: flex;
            flex-direction: column;
            background: #1e293b;
            overflow: hidden;
            min-height: 0;
        }

        .doc-header {
            padding: 16px 20px;
            border-bottom: 1px solid #334155;
        }

        .doc-header h2 {
            font-size: 16px;
            font-weight: 600;
            color: #a78bfa;
            margin-bottom: 12px;
        }

        .doc-upload-area {
            padding: 16px 20px;
            border-bottom: 1px solid #334155;
        }

        .doc-upload-area label {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .doc-upload-area input,
        .doc-upload-area textarea {
            width: 100%;
            background: #0f172a;
            border: 1px solid #475569;
            color: #e2e8f0;
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            margin-bottom: 8px;
        }

        .doc-upload-area textarea {
            min-height: 80px;
            resize: vertical;
        }

        .doc-upload-area input:focus,
        .doc-upload-area textarea:focus {
            outline: none;
            border-color: #a78bfa;
        }

        .doc-actions {
            display: flex;
            gap: 6px;
            margin-top: 4px;
        }

        .doc-list-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px 20px;
        }

        .doc-list-area h3 {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .doc-item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
            position: relative;
        }

        .doc-item-id {
            font-size: 11px;
            color: #64748b;
            word-break: break-all;
        }

        .doc-item-text {
            font-size: 13px;
            margin-top: 4px;
            color: #cbd5e1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .doc-item-score {
            font-size: 11px;
            color: #38bdf8;
            margin-top: 4px;
        }

        .doc-item .delete-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 14px;
            padding: 2px 6px;
        }

        .doc-item .delete-btn:hover { color: #ef4444; }

        /* ===== 状态指示 ===== */
        .status-bar {
            padding: 8px 20px;
            background: #0f172a;
            font-size: 11px;
            color: #64748b;
            border-top: 1px solid #334155;
            flex-shrink: 0;
        }

        .typing-indicator {
            display: inline-block;
        }

        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #38bdf8;
            border-radius: 50%;
            margin-right: 3px;
            animation: blink 1.4s infinite both;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 80%, 100% { opacity: 0.2; }
            40% { opacity: 1; }
        }

        /* ===== 滚动条 ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body>

<!-- 左侧：对话区 -->
<div class="chat-panel">
    <div class="chat-header">
        <h1>AIOps Agent</h1>
        <div class="session-info">
            Session ID: <input type="text" id="sessionId" value="session-001" />
        </div>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="message assistant">
            <div class="message-label">AIOps Agent</div>
            <div class="message-content">
                你好！我是智能运维排障助手，可以帮你：<br>
                - 查询 Prometheus 监控指标<br>
                - 检索运维知识库<br>
                - 分析故障并给出排查建议<br><br>
                请描述你遇到的问题，我来帮你排查。
            </div>
        </div>
    </div>

    <div class="chat-input-area">
        <div class="chat-input-row">
            <textarea id="chatInput" placeholder="描述你遇到的运维问题..." rows="1"
                      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
            <button class="btn-primary" id="sendBtn" onclick="sendMessage()">发送</button>
            <button class="btn-danger btn-sm" onclick="clearSession()">清空会话</button>
        </div>
    </div>
</div>

<!-- 右侧：知识库管理 -->
<div class="doc-panel">
    <div class="doc-header">
        <h2>知识库管理</h2>
        <div style="display:flex;gap:6px;">
            <button class="btn-secondary btn-sm" onclick="searchDocs()">搜索文档</button>
            <button class="btn-danger btn-sm" onclick="clearAllDocs()">清空全部</button>
        </div>
    </div>

    <div class="doc-upload-area">
        <label>文档标题</label>
        <input type="text" id="docTitle" placeholder="如：JVM调优手册" />
        <label>文档内容（支持 Markdown）</label>
        <textarea id="docContent" placeholder="## Full GC 排查方案&#10;&#10;### 处理步骤&#10;1. jstat -gcutil 查看各区使用率&#10;2. jmap -heap 查看堆内存配置"></textarea>
        <div class="doc-actions">
            <button class="btn-primary btn-sm" onclick="uploadDoc()">上传文档</button>
            <button class="btn-secondary btn-sm" onclick="uploadSampleDocs()">上传示例文档</button>
        </div>
    </div>

    <div class="doc-list-area" id="docList">
        <h3>文档列表</h3>
        <p style="color:#64748b;font-size:12px;">点击"搜索文档"查看知识库内容</p>
    </div>

    <div class="status-bar" id="statusBar">
        就绪 | 后端: <span id="backendStatus">检测中...</span>
    </div>
</div>

<script>
    const API_BASE = '';
    let isStreaming = false;

    // ===== 初始化 =====
    document.addEventListener('DOMContentLoaded', () => {
        checkBackend();
        setInterval(checkBackend, 10000);  // 每10秒轮询后端状态
        document.getElementById('chatInput').focus();
    });

    async function checkBackend() {
        try {
            const res = await fetch('/actuator/health');
            const data = await res.json();
            document.getElementById('backendStatus').textContent = data.status === 'UP' ? '✅ 在线' : '❌ 异常';
        } catch {
            document.getElementById('backendStatus').textContent = '❌ 离线';
        }
    }

    // ===== 对话 =====
    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const message = input.value.trim();
        if (!message || isStreaming) return;

        const sessionId = document.getElementById('sessionId').value || 'session-001';
        input.value = '';
        input.style.height = 'auto';

        // 显示用户消息
        appendMessage('user', message);

        // 创建助手消息容器
        const assistantDiv = appendMessage('assistant', '');
        const contentDiv = assistantDiv.querySelector('.message-content');
        contentDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

        isStreaming = true;
        document.getElementById('sendBtn').disabled = true;
        document.getElementById('statusBar').textContent = 'Agent 思考中...';

        try {
            // 使用 SSE 流式
            const url = `${API_BASE}/api/chat/stream?sessionId=${encodeURIComponent(sessionId)}&message=${encodeURIComponent(message)}`;
            const response = await fetch(url);

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullText = '';
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop(); // 保留不完整的行

                for (const line of lines) {
                    if (line.startsWith('data:')) {
                        const data = line.slice(5);
                        if (data.trim() === '[DONE]') continue;
                        fullText += data;
                        // 实时渲染 Markdown
                        contentDiv.innerHTML = marked.parse(fullText);
                    }
                }
            }

            // 处理 buffer 中剩余的内容
            if (buffer.startsWith('data:')) {
                const data = buffer.slice(5);
                if (data.trim() !== '[DONE]') {
                    fullText += data;
                }
            }

            // 最终渲染
            if (fullText) {
                contentDiv.innerHTML = marked.parse(fullText);
            } else {
                contentDiv.textContent = '（Agent 未返回内容）';
            }

        } catch (e) {
            // SSE 失败，尝试非流式
            console.warn('SSE failed, falling back to non-streaming:', e);
            try {
                const res = await fetch(`${API_BASE}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId, message })
                });
                const data = await res.json();
                contentDiv.innerHTML = marked.parse(data.answer || '（无回复）');
            } catch (e2) {
                contentDiv.textContent = '请求失败: ' + e2.message;
            }
        }

        isStreaming = false;
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('statusBar').textContent = '就绪';
        scrollToBottom();
    }

    function appendMessage(role, content) {
        const container = document.getElementById('chatMessages');
        const div = document.createElement('div');
        div.className = `message ${role}`;

        const label = document.createElement('div');
        label.className = 'message-label';
        label.textContent = role === 'user' ? '你' : 'AIOps Agent';

        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        if (role === 'assistant') {
            contentDiv.innerHTML = marked.parse(content);
        } else {
            contentDiv.textContent = content;
        }

        div.appendChild(label);
        div.appendChild(contentDiv);
        container.appendChild(div);
        scrollToBottom();
        return div;
    }

    function scrollToBottom() {
        const container = document.getElementById('chatMessages');
        container.scrollTop = container.scrollHeight;
    }

    async function clearSession() {
        const sessionId = document.getElementById('sessionId').value || 'session-001';
        try {
            await fetch(`${API_BASE}/api/sessions/${sessionId}`, { method: 'DELETE' });
            document.getElementById('chatMessages').innerHTML = '';
            appendMessage('assistant', '会话已清空。请描述你遇到的运维问题。');
        } catch (e) {
            alert('清空失败: ' + e.message);
        }
    }

    // ===== 文档管理 =====
    async function uploadDoc() {
        const title = document.getElementById('docTitle').value.trim();
        const content = document.getElementById('docContent').value.trim();
        if (!content) { alert('请输入文档内容'); return; }

        try {
            const res = await fetch(`${API_BASE}/api/documents`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: title || '未命名文档', content })
            });
            const data = await res.json();
            alert(`上传成功！分为 ${data.chunkCount} 个分片存入知识库`);
            document.getElementById('docTitle').value = '';
            document.getElementById('docContent').value = '';
            refreshDocList();
        } catch (e) {
            alert('上传失败: ' + e.message);
        }
    }

    async function uploadSampleDocs() {
        const samples = [
            {
                title: "JVM Full GC 排查手册",
                content: "## JVM Full GC 排查方案\n\n### 现象\n服务频繁Full GC，响应变慢，STW时间增长\n\n### 处理步骤\n1. jstat -gcutil 查看各区使用率，重点关注老年代O和Full GC次数F\n2. jmap -heap 查看堆内存配置是否合理\n3. jmap -histo:live 查看存活对象分布，找大对象\n4. 导出heap dump用MAT分析泄漏对象\n5. 检查是否有大对象直接进入老年代（PretenureSizeThreshold）\n\n### 常见原因\n- 内存泄漏：集合类未清理、ThreadLocal未remove\n- 堆内存配置过小\n- 大对象分配：大数组、大字符串\n- 永久代/元空间不足"
            },
            {
                title: "MySQL 慢查询优化手册",
                content: "## MySQL 慢查询排查方案\n\n### 现象\n数据库查询耗时超过5秒，接口超时，连接池耗尽\n\n### 处理步骤\n1. 开启慢查询日志：set global slow_query_log=ON\n2. 使用 EXPLAIN 分析执行计划，重点关注type、key、rows\n3. 检查是否缺少索引：type为ALL表示全表扫描\n4. 优化SQL：避免SELECT *，使用覆盖索引\n5. 检查索引选择性：SHOW INDEX FROM table\n6. 考虑分库分表（数据量超千万）\n\n### 常见原因\n- 缺少索引或索引失效\n- 查询返回过多数据\n- 锁等待：innodb_row_lock_waits高\n- 连接数过多：max_connections不足"
            },
            {
                title: "Redis 内存溢出排查手册",
                content: "## Redis 内存溢出排查\n\n### 现象\nRedis used_memory持续增长，触发maxmemory策略，key被驱逐\n\n### 处理步骤\n1. redis-cli INFO memory 查看内存使用详情\n2. redis-cli --bigkeys 扫描大key\n3. redis-cli --scan --pattern '*' | xargs redis-cli TTL 检查TTL\n4. 检查是否有过期时间未设置的key\n5. 设置合理的maxmemory-policy：allkeys-lru\n6. 考虑使用Redis Cluster分片\n\n### 常见原因\n- 大Key：单个value超10MB\n- 未设置过期时间：缓存永不过期\n- 数据结构选择不当：用String存JSON而非Hash\n- 客户端连接泄漏"
            },
            {
                title: "CPU 飙高排查手册",
                content: "## CPU 飙高排查方案\n\n### 现象\n服务器CPU使用率持续90%+，服务响应变慢\n\n### 处理步骤\n1. top 命令找到CPU占用最高的Java进程PID\n2. top -Hp PID 找到占用最高的线程TID\n3. printf '%x\\n' TID 将线程ID转为十六进制\n4. jstack PID | grep 十六进制TID 查看线程堆栈\n5. 分析堆栈定位问题代码\n\n### 常见原因\n- 死循环：while(true)无退出条件\n- 频繁GC：内存不足导致CPU花在GC上\n- 线程池配置过大：线程上下文切换开销大\n- 正则回溯：复杂正则匹配长字符串\n- 序列化/反序列化：大对象的JSON处理"
            }
        ];

        try {
            const res = await fetch(`${API_BASE}/api/documents/batch`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ documents: samples })
            });
            const data = await res.json();
            alert(`批量上传成功！共 ${data.totalChunks} 个分片存入知识库`);
            refreshDocList();
        } catch (e) {
            alert('批量上传失败: ' + e.message);
        }
    }

    // 自动刷新文档列表（不弹 prompt）
    async function refreshDocList() {
        try {
            const res = await fetch(`${API_BASE}/api/documents?topK=50`);
            const data = await res.json();
            renderDocList(data, '');
        } catch (e) {
            console.warn('刷新文档列表失败:', e);
        }
    }

    async function searchDocs() {
        const keyword = prompt('输入搜索关键词（留空列出所有）:');
        if (keyword === null) return;

        try {
            const url = keyword
                ? `${API_BASE}/api/documents?keyword=${encodeURIComponent(keyword)}&topK=20`
                : `${API_BASE}/api/documents?topK=50`;
            const res = await fetch(url);
            const data = await res.json();
            renderDocList(data, keyword);
        } catch (e) {
            alert('搜索失败: ' + e.message);
        }
    }

    function renderDocList(data, keyword) {
        const listDiv = document.getElementById('docList');
        if (!data.documents || data.documents.length === 0) {
            listDiv.innerHTML = '<h3>文档列表</h3><p style="color:#64748b;font-size:12px;">知识库为空</p>';
            return;
        }

        // 按 title 分组（取分片第一行作为标题）
        const groups = {};
        for (const doc of data.documents) {
            const text = doc.text || doc.content || '';
            const title = text.split('\n')[0].trim() || '未命名文档';
            if (!groups[title]) groups[title] = [];
            groups[title].push(doc);
        }

        let html = `<h3>文档列表 (${Object.keys(groups).length} 篇, ${data.total} 个分片)</h3>`;
        for (const [title, chunks] of Object.entries(groups)) {
            const avgScore = chunks.filter(c => c.score).length > 0
                ? (chunks.filter(c => c.score).reduce((s, c) => s + c.score, 0) / chunks.filter(c => c.score).length * 100).toFixed(1) + '%'
                : '';
            html += `
                <div class="doc-item">
                    <button class="delete-btn" onclick="deleteDocGroup('${escapeHtml(title)}')" title="删除整篇">✕</button>
                    <div style="font-size:13px;color:#e2e8f0;font-weight:500;">${escapeHtml(title)}</div>
                    <div style="font-size:11px;color:#64748b;margin-top:2px;">${chunks.length} 个分片${avgScore ? ' · 相似度 ' + avgScore : ''}</div>
                </div>`;
        }
        listDiv.innerHTML = html;
    }

    async function deleteDocGroup(title) {
        if (!confirm(`确认删除文档"${title}"的所有分片？`)) return;
        // 先搜索该文档的所有分片，逐个删除
        try {
            const res = await fetch(`${API_BASE}/api/documents?keyword=${encodeURIComponent(title)}&topK=50`);
            const data = await res.json();
            if (data.documents) {
                for (const doc of data.documents) {
                    const text = doc.text || doc.content || '';
                    if (text.split('\n')[0].trim() === title) {
                        await fetch(`${API_BASE}/api/documents/${doc.id}`, { method: 'DELETE' });
                    }
                }
            }
            refreshDocList();
        } catch (e) {
            alert('删除失败: ' + e.message);
        }
    }

    async function deleteDoc(docId) {
        if (!confirm(`确认删除分片 ${docId.substring(0, 8)}...？`)) return;
        try {
            await fetch(`${API_BASE}/api/documents/${docId}`, { method: 'DELETE' });
            refreshDocList();
        } catch (e) {
            alert('删除失败: ' + e.message);
        }
    }

    async function clearAllDocs() {
        if (!confirm('确认清空所有文档？此操作不可恢复！')) return;
        try {
            await fetch(`${API_BASE}/api/documents`, { method: 'DELETE' });
            document.getElementById('docList').innerHTML = '<h3>文档列表</h3><p style="color:#64748b;font-size:12px;">知识库已清空</p>';
        } catch (e) {
            alert('清空失败: ' + e.message);
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // textarea 自动调高
    const chatInput = document.getElementById('chatInput');
    chatInput.addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });
</script>

</body>
</html>
